<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Catalogo</title>
    <script src="/utilities/validarToken.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/cssreset.css">
    <link rel="stylesheet" href="catalogo.css">
    <link rel="stylesheet" href="/usuario/usuario.css">
    <script src="/utilities/redirecionarPagina.js" defer></script>
    <script src="/utilities/modalEdicao.js"></script>
    <script src="catalogo.js" defer></script>
    <script src="/usuario/usuario.js" defer></script>


</head>

<body>
    <header>
        <div class="header">
            <div class="logo">
                <img src="/images/StockLogo.png" alt="Logo da Stock lista">
            </div>
            <div class="title">
                <h1>Catalogo</h1>
            </div>
            <div class="buttonsConfirm">
                <button class="add" id="btnAdd" onclick="abrirModalAdicionar()">Adicionar</button>

                <button class="delete" id="btnDelete" onclick="deletarItem()"><img src="/images/trashIcon.svg"
                        alt="icone de deletar"></button>
            </div>

        </div>
    </header>
    <section class="principal">
        <section class="sidebar">
            <div class="menus">
                <div class="menusTabelas">
                    <ul>
                        <li onclick="redirecionarPagina('lista')"><a href="/lista/index.html"></a>Lista</li>

                        <li id="atual" onclick="redirecionarPagina('catalogo')"> <a
                                href="/catalogo/catalogo.html"></a>Catalogo</li>

                        <li onclick="redirecionarPagina('dicas')"><a href="/dicas/dicas.html"></a>Dicas</li>

                        <li onclick="redirecionarPagina('historico')"><a
                                href="/historico/historico.html"></a>Histórico</li>
                    </ul>
                </div>
                <div class="usuarioSection" id="usuarioSection" onclick="abrirModalUsuario()">

                </div>
            </div>

        </section>
        <section class="sectionLista">
            <div class="utilitarios">
                <div class="searchBar">
                    <img src="/images/searchIcon.svg" alt="">
                    <input type="text" id="inputBuscaLista" placeholder="Pesquisar" onkeyup="filtrarListaPrincipal()">
                </div>

            </div>
            <div class="lista" id="lista">

            </div>
            <div class="paginacao-container">
                <button id="btnAnterior" class="btn-seta" onclick="mudarPagina(-1)"><img
                        src="/images/less-than-svgrepo-com.svg" alt=""></button>

                <div id="paginacaoBullets" class="bullets">
                </div>

                <button id="btnProximo" class="btn-seta" onclick="mudarPagina(1)"><img
                        src="/images/greater-than-svgrepo-com.svg" alt=""></button>
            </div>
            <div id="modalCatalogo" class="modal-overlay hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Novo Produto</h2>
                        <button onclick="fecharModalCatalogo()" class="btn-close">&times;</button>
                    </div>

                    <div class="modal-body">
                        <div class="form-group">
                            <label>Nome do Produto</label>
                            <input type="text" id="inputNomeProduto" placeholder="Ex: Detergente, Maçã.">
                        </div>

                        <div class="form-group">
                            <label>Categoria</label>
                            <select id="selectCategoria">
                                <option value="Outros">📦 Outros / Geral</option>

                                <optgroup label="🖥️ Tecnologia & Eletrônicos">
                                    <option value="Hardware">Hardware PC (GPU, CPU, RAM)</option>
                                    <option value="Perifericos">Periféricos (Teclado, Mouse)</option>
                                    <option value="Cabos">Cabos, Fontes e Adaptadores</option>
                                    <option value="Audio">Áudio e Vídeo</option>
                                    <option value="Celulares">Celulares e Acessórios</option>
                                    <option value="Eletronica">Componentes Eletrônicos</option>
                                </optgroup>

                                <optgroup label="🛠️ Ferramentas & Oficina">
                                    <option value="Ferramentas Manuais">Ferramentas Manuais</option>
                                    <option value="Ferramentas Eletricas">Ferramentas Elétricas</option>
                                    <option value="Ferragens">Ferragens (Parafusos, Pregos)</option>
                                    <option value="Madeiras">Madeiras e Chapas</option>
                                    <option value="Acabamento">Tintas e Acabamento</option>
                                    <option value="EPI">EPI e Segurança</option>
                                </optgroup>

                                <optgroup label="🏠 Casa & Mercado">
                                    <option value="Alimentacao">Alimentação Geral</option>
                                    <option value="Limpeza">Limpeza e Lavanderia</option>
                                    <option value="Cozinha">Utensílios de Cozinha</option>
                                    <option value="Organizacao">Caixas e Organização</option>
                                    <option value="Decoracao">Decoração</option>
                                </optgroup>

                                <optgroup label="✏️ Escritório & Estudos">
                                    <option value="Papelaria">Papelaria e Escrita</option>
                                    <option value="Impressao">Impressão e Papéis</option>
                                    <option value="Livros">Livros e Cadernos</option>
                                </optgroup>

                                <optgroup label="🎨 Hobbies & Lazer">
                                    <option value="Fotografia">Fotografia</option>
                                    <option value="Cutelaria">Cutelaria</option>
                                    <option value="Automotivo">Automotivo</option>
                                    <option value="Camping">Camping e Pesca</option>
                                    <option value="Games">Jogos e Consoles</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="modal-actions">
                            <button onclick="adicionarAoStageCatalogo()" class="btn-primary">Adicionar à Lista
                                (+)</button>
                        </div>

                        <div id="areaResumoCatalogo" class="resumo-stage hidden">
                            <hr>
                            <h3>Itens a Salvar (<span id="contadorStageCatalogo">0</span>)</h3>
                            <ul id="listaStageCatalogo">
                            </ul>
                            <div class="modal-actions">
                                <button onclick="salvarTudoNoCatalogo()" class="btn-finalizar-modal">Salvar Tudo no
                                    Banco</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
         <div id="modalEdicao" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="tituloModalEdicao">Editar Item</h2>
                <button onclick="fecharModalEdicao()" class="btn-close">&times;</button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="editId">
                <input type="hidden" id="editContexto">

                <div class="form-group">
                    <label>Nome do Item</label>
                    <input type="text" id="editNome" disabled>
                </div>

                <div class="form-group">
                    <label>Quantidade</label>
                    <div class="input-group">
                        <input type="number" id="editQuantidade" placeholder="Ex: 1">
                        <select id="editUnidade">
                            <option value="un">unidades</option>
                            <option value="kg">kg</option>
                            <option value="g">gramas</option>
                            <option value="l">litros</option>
                            <option value="dz">dúzias</option>
                            <option value="cx">caixa</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Observação / Comentário</label>
                    <textarea id="editComentario" rows="3" placeholder="Insira os detalhes."></textarea>
                </div>

                <div class="modal-actions">
                    <button onclick="fecharModalEdicao()" class="btn-secondary">Cancelar</button>
                    <button onclick="salvarEdicao()" class="btn-primary">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
