<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../utilities/validarToken.js"></script>
    <script type="module" src="dicas.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../cssreset.css">
    <link rel="stylesheet" href="dicas.css">
    <link rel="stylesheet" href="../usuario/usuario.css">
    <script src="../utilities/redirecionarPagina.js"></script>
    <script type="module"  src="../usuario/usuario.js" defer></script>
    <script src="/utilities/modalEdicao.js"></script>
    <title>Dicas</title>
</head>

<body>
    <header>
        <div class="header">
            <div class="logo">
                <img src="../images/StockLogo.png" alt="Logo da Stock lista">
            </div>
            <div class="title">
                <h1>Dicas</h1>
            </div>
            <div class="buttonsConfirm">
                <button class="add" id="btnAdd" onclick="abrirModalAdicionar()">Adicionar</button>

                <button class="delete" id="btnDelete" onclick="deletarItem()"><img src="../images/trashIcon.svg"
                        alt="icone de deletar"></button>
            </div>

        </div>
    </header>
    <section class="principal">
        <section class="sidebar">
            <div class="menusTabelas">
                <ul>
                    <li onclick="redirecionarPagina('lista')"><a href="../lista/lista.html"></a>Lista</li>

                    <li onclick="redirecionarPagina('catalogo')"> <a href="../catalogo/catalogo.html"></a>Catalogo</li>

                    <li id="atual" onclick="redirecionarPagina('dicas')"><a href="../dicas/dicas.html"></a>Dicas</li>

                    <li onclick="redirecionarPagina('historico')"><a href="../historico/historico.html"></a>Histórico
                    </li>
                </ul>
            </div>
            <div class="usuarioSection" id="usuarioSection" onclick="abrirModalUsuario()">

            </div>
        </section>
        <section class="sectionLista">
            <div class="utilitarios">
                <div class="searchBar">
                    <img src="../images/searchIcon.svg" alt="">
                    <input type="text" id="inputBuscaLista" placeholder="Pesquisar" onkeyup="filtrarListaPrincipal()">
                </div>

            </div>
            <div class="lista" id="lista">

            </div>
            <div class="paginacao-container">
                <button id="btnAnterior" class="btn-seta" onclick="mudarPagina(-1)"><img
                        src="../images/less-than-svgrepo-com.svg" alt=""></button>

                <div id="paginacaoBullets" class="bullets">
                </div>

                <button id="btnProximo" class="btn-seta" onclick="mudarPagina(1)"><img
                        src="../images/greater-than-svgrepo-com.svg" alt=""></button>
            </div>
        </section>

    </section>
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-content">

            <div class="modal-header">
                <h2>Adicionar Nova Dica</h2>
                <button onclick="fecharModal()" class="btn-close">&times;</button>
            </div>

            <div id="telaConfiguracao">
                <div class="form-group">
                    <label>Título da Dica</label>
                    <input type="text" id="inputTituloDica" placeholder="Ex: Mercado Dia tá barato">
                </div>

                <div class="form-group">
                    <label>Produto Relacionado (Nome)</label>
                    <input type="text" id="inputProdutoDica" placeholder="Ex: Arroz branco">
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="inputDescricaoDica" rows="4"
                        placeholder="Ex: O pacote de 5kg está saindo por R$ 20,00..."></textarea>
                </div>

                <div class="modal-actions">
                    <button onclick="fecharModal()" class="btn-secondary">Cancelar</button>
                    <button onclick="salvarDica()" class="btn-primary">Salvar Dica</button>
                </div>
            </div>

        </div>
    </div>
    <div id="modalEdicao" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="tituloModalEdicao">Editar Item</h2>
                <button onclick="fecharModalEdicao()" class="btn-close">&times;</button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="editId">
                <input type="hidden" id="editContexto">

                <div class="form-group">
                    <label id="labelEditNome">Nome do Item</label>
                    <input type="text" id="editNome" disabled>
                </div>

                <div class="form-group" id="grupoQuantidadeEdicao">
                    <label>Quantidade</label>
                    <div class="input-group">
                        <input type="number" id="editQuantidade" placeholder="Ex: 1">
                        <select id="editUnidade">
                            <option value="un">unidades</option>
                            <option value="kg">kg</option>
                            <option value="g">gramas</option>
                            <option value="l">litros</option>
                            <option value="dz">dúzias</option>
                            <option value="cx">caixa</option>
                        </select>
                    </div>
                </div>

                <div class="form-group hidden" id="grupoProdutoEdicao">
                    <label>Produto Relacionado</label>
                    <input type="text" id="editProdutoDica" placeholder="Ex: Maçã">
                </div>

                <div class="form-group">
                    <label id="labelEditComentario">Observação</label>
                    <textarea id="editComentario" rows="3" placeholder="Insira os detalhes..."></textarea>
                </div>

                <div class="modal-actions">
                    <button onclick="fecharModalEdicao()" class="btn-secondary">Cancelar</button>
                    <button onclick="salvarEdicao()" class="btn-primary">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>
    <div class='aviso hidden'></div>
</body>

</html>
